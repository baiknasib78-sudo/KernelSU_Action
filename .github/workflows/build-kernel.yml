name: Build Kernel
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
    - uses: actions/checkout@v4

    - name: Prepare Configuration
      run: |
        CONFIG_ENV=$(grep -w "CONFIG_ENV" config.env | head -n 1 | cut -d "=" -f 2)
        CONFIG_LIST=(
            KERNEL_SOURCE KERNEL_SOURCE_BRANCH KERNEL_CONFIG KERNEL_IMAGE_NAME
            ARCH ADD_LOCALVERSION_TO_FILENAME EXTRA_CMDS USE_CUSTOM_CLANG
            CUSTOM_CLANG_SOURCE CUSTOM_CLANG_BRANCH CUSTOM_CMDS CLANG_BRANCH
            CLANG_VERSION ENABLE_GCC_ARM64 ENABLE_GCC_ARM32 USE_CUSTOM_GCC_64
            CUSTOM_GCC_64_SOURCE CUSTOM_GCC_64_BRANCH CUSTOM_GCC_64_BIN
            USE_CUSTOM_GCC_32 CUSTOM_GCC_32_SOURCE CUSTOM_GCC_32_BRANCH
            CUSTOM_GCC_32_BIN ENABLE_KERNELSU KERNELSU_TAG ADD_KPROBES_CONFIG
            DISABLE-LTO ADD_OVERLAYFS_CONFIG DISABLE_CC_WERROR APPLY_KSU_PATCH
            USE_CUSTOM_ANYKERNEL3 CUSTOM_ANYKERNEL3_SOURCE CUSTOM_ANYKERNEL3_BRANCH
            ENABLE_CCACHE NEED_DTBO BUILD_BOOT_IMG SOURCE_BOOT_IMAGE
            KSU_EXPECTED_SIZE KSU_EXPECTED_HASH REMOVE_UNUSED_PACKAGES
        )

        for CONFIG in "${CONFIG_LIST[@]}"; do
            if [[ "$CONFIG" == "EXTRA_CMDS" || "$CONFIG" == "CUSTOM_CMDS" ]]; then
                echo "$CONFIG=$(grep -w "$CONFIG" "$CONFIG_ENV" | head -n 1 | cut -d ":" -f 2-)" >> $GITHUB_ENV
            else
                echo "$CONFIG=$(grep -w "$CONFIG" "$CONFIG_ENV" | head -n 1 | cut -d "=" -f 2-)" >> $GITHUB_ENV
            fi
        done

    - name: Remove unused packages
      if: env.REMOVE_UNUSED_PACKAGES == 'true'
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: false

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build kernel environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Jakarta date "+%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "DEVICE=$(echo ${{ env.KERNEL_CONFIG }} | sed 's!vendor/!!;s/_defconfig//;s/_user//;s/-perf//')" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python2 python3
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Download Toolchains (Clang & GCC)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        
        # 1. Download Clang
        if [ "${{ env.USE_CUSTOM_CLANG }}" = "true" ]; then
            if echo "${{ env.CUSTOM_CLANG_SOURCE }}" | grep -q ".git"; then
                git clone "${{ env.CUSTOM_CLANG_SOURCE }}" -b "${{ env.CUSTOM_CLANG_BRANCH }}" clang-aosp --depth=1
            else
                wget -O clang.bin "${{ env.CUSTOM_CLANG_SOURCE }}" && mkdir clang-aosp
                if echo "${{ env.CUSTOM_CLANG_SOURCE }}" | grep -q ".zip"; then
                    unzip clang.bin -d clang-aosp/
                else
                    tar -C clang-aosp/ -zxvf clang.bin || tar -C clang-aosp/ -xvf clang.bin
                fi
            fi
        else
            mkdir clang-aosp
            wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/${{ env.CLANG_BRANCH }}/clang-${{ env.CLANG_VERSION }}.tar.gz -O clang.tar.gz
            tar -C clang-aosp/ -zxvf clang.tar.gz
        fi

        # 2. Download GCC 64
        if [ "${{ env.ENABLE_GCC_ARM64 }}" = "true" ]; then
            mkdir gcc-64
            if [ "${{ env.USE_CUSTOM_GCC_64 }}" = "true" ]; then
                if echo "${{ env.CUSTOM_GCC_64_SOURCE }}" | grep -q ".git"; then
                    git clone "${{ env.CUSTOM_GCC_64_SOURCE }}" -b "${{ env.CUSTOM_GCC_64_BRANCH }}" gcc-64 --depth=1
                else
                    wget -O gcc64.bin "${{ env.CUSTOM_GCC_64_SOURCE }}"
                    tar -C gcc-64/ -zxvf gcc64.bin || unzip gcc64.bin -d gcc-64/
                fi
                BIN_64="${{ env.CUSTOM_GCC_64_BIN }}"
            else
                wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz -O gcc64.tar.gz
                tar -C gcc-64/ -zxvf gcc64.tar.gz
                BIN_64="aarch64-linux-android-"
            fi
            echo "GCC_64=CROSS_COMPILE=$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin/$BIN_64" >> $GITHUB_ENV
        fi

        # 3. Download GCC 32
        if [ "${{ env.ENABLE_GCC_ARM32 }}" = "true" ]; then
            mkdir gcc-32
            if [ "${{ env.USE_CUSTOM_GCC_32 }}" = "true" ]; then
                if echo "${{ env.CUSTOM_GCC_32_SOURCE }}" | grep -q ".git"; then
                    git clone "${{ env.CUSTOM_GCC_32_SOURCE }}" -b "${{ env.CUSTOM_GCC_32_BRANCH }}" gcc-32 --depth=1
                else
                    wget -O gcc32.bin "${{ env.CUSTOM_GCC_32_SOURCE }}"
                    tar -C gcc-32/ -zxvf gcc32.bin || unzip gcc32.bin -d gcc-32/
                fi
                BIN_32="${{ env.CUSTOM_GCC_32_BIN }}"
            else
                wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz -O gcc32.tar.gz
                tar -C gcc-32/ -zxvf gcc32.tar.gz
                BIN_32="arm-linux-androideabi-"
            fi
            echo "GCC_32=CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/kernel_workspace/gcc-32/bin/$BIN_32" >> $GITHUB_ENV
        fi

    - name: Download Kernel Source & Tools
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1
        if [ "${{ env.BUILD_BOOT_IMG }}" = "true" ]; then
            git clone https://android.googlesource.com/platform/system/tools/mkbootimg tools -b master-kernel-build-2022 --depth=1
            wget -O boot-source.img ${{ env.SOURCE_BOOT_IMAGE }}
            if [ -f boot-source.img ]; then
                echo "FORMAT_MKBOOTING=$(python3 tools/unpack_bootimg.py --boot_img boot-source.img --format mkbootimg)" >> $GITHUB_ENV
                echo "HAVE_SOURCE_BOOT_IMAGE=true" >> $GITHUB_ENV
            fi
        fi
        [ "${{ env.ADD_LOCALVERSION_TO_FILENAME }}" = "true" ] && echo "LOCALVERSION=$(cat android-kernel/localversion)" >> $GITHUB_ENV || echo "LOCALVERSION=" >> $GITHUB_ENV

    - name: Setup KernelSU Next
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s dev
        if [ -d "KernelSU-Next" ]; then KSU_DIR="KernelSU-Next"; else KSU_DIR="drivers/kernelsu"; fi
        KSU_VERSION=$(cd $KSU_DIR && expr $(/usr/bin/git rev-list --count HEAD) + 10200)
        echo "UPLOADNAME=-KernelSU_Next_$KSU_VERSION" >> $GITHUB_ENV

    - name: Setup Configuration & Fixes
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # 0. Deteksi folder KSU secara otomatis
        if [ -d "KernelSU-Next" ]; then
            KSU_PATH="KernelSU-Next"
        elif [ -d "drivers/kernelsu" ]; then
            KSU_PATH="drivers/kernelsu"
        else
            echo "KSU folder not found!"
            exit 1
        fi
        echo "KSU found in: $KSU_PATH"

        # 1. FIX: compiler_types.h Not Found (Untuk Kernel < 4.14)
        find $KSU_PATH -type f -exec grep -l "linux/compiler_types.h" {} + | xargs sed -i 's/linux\/compiler_types.h/linux\/compiler.h/g' || true

        # 2. FIX: syscall_fn_t untuk Rolex (Kernel 4.9)
        HOOK_FILE=$(find $KSU_PATH -name "syscall_hook.h")
        if [ ! -z "$HOOK_FILE" ]; then
            sed -i '/typedef long (*syscall_fn_t)/d' $HOOK_FILE
            sed -i '/linux\/ptrace.h/d' $HOOK_FILE
            sed -i '1i #include <linux/ptrace.h>' $HOOK_FILE
            sed -i '2i typedef long (*syscall_fn_t)(const struct pt_regs *);' $HOOK_FILE
        fi

        # 3. FIX: PR_SET_VMA redefinition
        find $KSU_PATH -type f -name "*.c" -o -name "*.h" | xargs sed -i 's/PR_SET_VMA/PR_SET_VMA_KSU/g' || true

        # 4. Defconfig adjustments (Anti-Tabrakan & Fix Stack Protector)
        CONF="arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}"
        set_config() {
            sed -i "/$1/d" $CONF
            echo "$1=$2" >> $CONF
        }

        # Fix Error 1: Stack Protector
        set_config "CONFIG_CC_STACKPROTECTOR" "n"
        set_config "CONFIG_CC_STACKPROTECTOR_NONE" "y"
        set_config "CONFIG_CC_STACKPROTECTOR_STRONG" "n"
        set_config "CONFIG_CC_STACKPROTECTOR_REGULAR" "n"

        [ "${{ env.ENABLE_KERNELSU }}" = "true" ] && set_config "CONFIG_KSU" "y"
        if [ "${{ env.ADD_KPROBES_CONFIG }}" = "true" ]; then
            set_config "CONFIG_MODULES" "y"
            set_config "CONFIG_KPROBES" "y"
            set_config "CONFIG_HAVE_KPROBES" "y"
            set_config "CONFIG_KPROBE_EVENTS" "y"
        fi
        [ "${{ env.ADD_OVERLAYFS_CONFIG }}" = "true" ] && set_config "CONFIG_OVERLAY_FS" "y"
        [ "${{ env.DISABLE_CC_WERROR }}" = "true" ] && set_config "CONFIG_CC_WERROR" "n"

        # Matikan WERROR global supaya tidak gampang error karena warning
        sed -i 's/-Werror//g' Makefile

    - name: Setup ccache
      if: env.ENABLE_CCACHE == 'true'
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-${{ env.DEVICE }}${{ env.LOCALVERSION }}${{ env.UPLOADNAME }}
        max-size: 2G

    - name: Build Kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        if [ ! -z "${{ env.KSU_EXPECTED_SIZE }}" ]; then
            export KSU_EXPECTED_SIZE=${{ env.KSU_EXPECTED_SIZE }}
            export KSU_EXPECTED_HASH=${{ env.KSU_EXPECTED_HASH }}
        fi
        
        make O=out ARCH=${{ env.ARCH }} ${{ env.KERNEL_CONFIG }}
        make -j$(nproc --all) CC="ccache clang" O=out ARCH=${{ env.ARCH }} ${{ env.CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }} ${{ env.GCC_64 }} ${{ env.GCC_32 }}

    - name: Check Output & Prepare Artifacts
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        IMG="android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}"
        if [ -f "$IMG" ]; then
            echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
            git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AK3
            cp $IMG AK3/
            [ "${{ env.NEED_DTBO }}" = "true" ] && cp android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img AK3/ || true
            rm -rf AK3/.git*
            
            if [ "${{ env.HAVE_SOURCE_BOOT_IMAGE }}" = "true" ]; then
                python3 tools/unpack_bootimg.py --boot_img boot-source.img --out out_boot
                cp $IMG out_boot/kernel
                python3 tools/mkbootimg.py ${{ env.FORMAT_MKBOOTING }} -o boot-ksu.img
            fi
        else
            echo "Kernel file not found!" && exit 1
        fi

    - name: Upload Results
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: |
          kernel_workspace/AK3/*
          kernel_workspace/boot-ksu.img
          kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}
